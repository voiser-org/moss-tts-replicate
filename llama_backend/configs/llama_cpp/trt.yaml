# Maksimum Hız İçin TensorRT + PyTorch LM Heads Konfigürasyonu
backbone_gguf: /src/weights/MOSS-TTS-GGUF/MOSS_TTS_Q4_K_M.gguf
embedding_dir: /src/weights/MOSS-TTS-GGUF/embeddings
lm_head_dir: /src/weights/MOSS-TTS-GGUF/lm_heads
tokenizer_dir: /src/weights/MOSS-TTS-GGUF/tokenizer

audio_backend: trt
audio_encoder_trt: /src/weights/MOSS-Audio-Tokenizer-TRT/encoder.engine
audio_decoder_trt: /src/weights/MOSS-Audio-Tokenizer-TRT/decoder.engine

heads_backend: auto

n_ctx: 4096
n_batch: 512
n_threads: 32
n_gpu_layers: -1
max_new_tokens: 3072
use_gpu_audio: true
flash_attn: enabled

text_temperature: 1.5
text_top_p: 1.0
text_top_k: 50

audio_temperature: 1.7
audio_top_p: 0.8
audio_top_k: 25
audio_repetition_penalty: 1.0
