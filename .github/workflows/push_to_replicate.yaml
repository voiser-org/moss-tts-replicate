name: Push to Replicate

on:
  push:
    branches:
      - main
    paths:
      - "llama_backend/predict.py"
      - "llama_backend/cog.yaml"
      - "llama_backend/configs/**"
  workflow_dispatch:

jobs:
  push_to_replicate:
    name: Push to Replicate
    runs-on: ubuntu-latest
    steps:
      # 1. Disk alanını temizle
      # Docker imajı inşası için GitHub Actions sunucusunda yer açılır.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      # 2. Kaynak kodları çek
      - name: Checkout
        uses: actions/checkout@v4

      # 3. Cog aracını kur
      # GitHub Repository Secrets kısmına eklenen REPLICATE_API_TOKEN kullanılır.
      - name: Setup Cog
        uses: replicate/setup-cog@v2
        with:
          token: ${{ secrets.REPLICATE_API_TOKEN }}

      # 4. Modeli derle ve Replicate'e yükle (Push)
      - name: Push to Replicate
        run: |
          cd llama_backend
          cog push r8.im/voiser-ai/moss-tts-llama
